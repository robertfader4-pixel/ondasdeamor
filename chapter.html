<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Глава — Северная любовь</title>
  <meta name="description" content="Чтение главы романа «Северная любовь»." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="chapter-body">
  <div class="sky-glow sky-glow-one"></div>
  <div class="sky-glow sky-glow-two"></div>
  <div class="snow snow-a"></div>
  <div class="snow snow-b"></div>

  <header class="chapter-header container">
    <a class="back-link" href="index.html">← На главную</a>
    <div class="chapter-heading glass-card">
      <p class="section-label">Северная любовь</p>
      <h1 id="chapter-title">Глава</h1>
      <p class="chapter-summary" id="chapter-summary"></p>
    </div>
  </header>

  <main class="container reading-layout">
    <article class="reader-card" id="chapter-content"></article>

    <aside class="side-card">
      <h2>Навигация</h2>
      <p class="side-text">Выберите нужную главу и продолжайте чтение в удобном темпе.</p>
      <div class="chapter-nav" id="chapter-nav"></div>
      <a class="button button-primary full-width" href="index.html#chapters">Вернуться к списку глав</a>
    </aside>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/chapter.js"></script>

  <div class="music-launcher">
    <button id="openSoundBtn" class="music-open-btn" type="button" aria-label="Послушать музыку">
      <img src="assets/img/fox-play.png" alt="Слушать музыку">
    </button>
  </div>

  <canvas id="globalSpectrumCanvas" class="global-spectrum-canvas" aria-hidden="true"></canvas>

  <div id="soundModal" class="sound-modal" aria-hidden="true">
    <div class="sound-modal-backdrop"></div>
    <div id="soundModalCard" class="sound-modal-card">
      <div id="soundModalDrag" class="sound-modal-top">
        <div class="sound-modal-title">Саундтрек «Волны любви»</div>
        <button id="closeSoundBtn" class="sound-close" type="button" aria-label="Закрыть">×</button>
      </div>
      <div class="sound-controls">
        <div class="playlist-block">
          <audio id="soundtrack" controls preload="metadata"></audio>
          <div class="playlist-ui">
            <div class="playlist-label">Список воспроизведения</div>
            <div class="playlist-items" id="playlistItems">
              <button class="playlist-item active" type="button" data-src="assets/audio/prikosnovenie-istiny.mp3">Прикосновение истины</button>
              <button class="playlist-item" type="button" data-src="assets/audio/soundtrack.mp3" data-fallback="assets/audio/soundtrack.wav">Волны любви</button>
              <button class="playlist-item" type="button" data-src="assets/audio/la-lluvia.mp3">Дождь</button>
            </div>
          </div>
          <canvas id="spectrumCanvas" aria-hidden="true"></canvas>
        </div>
        <p class="sound-hint">Нажмите на лиса, чтобы открыть музыку. При закрытии списка воспроизведение остановится.</p>
      </div>
    </div>
  </div>

  <script src="assets/js/waves-player.js"></script>

</body>
</html>
